<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Unitbase GTM Dashboard</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 0.75rem;
        color: #222;
      }
      h1 { margin: 0; font-weight: 600; }
      .muted { color: #888; font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <h1>Unitbase GTM Dashboard</h1>
    <p class="muted">Under construction</p>
    <p class="muted" id="last-update"></p>
    <script>
      fetch('/dashboard.json')
        .then(r => r.json())
        .then(d => {
          if (!d.generated_at) return;
          const when = new Date(d.generated_at).toLocaleString();
          document.getElementById('last-update').textContent = `Last data update: ${when}`;
        })
        .catch(() => {});
    </script>
  </body>
</html>
